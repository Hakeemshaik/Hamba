name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      # base_path comes from configure-pages (e.g. /Hamba/) so assets resolve.
      - run: npm run build -- --base="${{ steps.pages.outputs.base_path }}/"

      # Call Analyser lives at <base_path>/calls/ on the same Pages site.
      - name: Build Call Analyser
        if: ${{ hashFiles('call-analyser/package.json') != '' }}
        run: |
          npm ci --prefix call-analyser
          npm run build --prefix call-analyser -- --base="${{ steps.pages.outputs.base_path }}/calls/"
          mkdir -p dist/calls
          cp -r call-analyser/dist/* dist/calls/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
